<ion-tabs #tabs (ionTabsDidChange)="setCurrentTab()">

  <ion-tab-bar slot="bottom" [class.selected-tab1]="selectedTab === 'tab1'" [class.selected-tab2]="selectedTab === 'tab2'" [class.selected-tab3]="selectedTab === 'tab3'">
    <div class="tab-highlight">
      <div class="highlight-bg">
        <div class="highlight-line"></div>
      </div>
    </div>
    <ion-tab-button tab="tab1" href="/tabs/tab1">
      <ion-icon aria-hidden="true" name="home"></ion-icon>
      <ion-label></ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab2" href="/tabs/tab2">
      <ion-icon aria-hidden="true" name="barbell" style="transform: rotate(-45deg)"></ion-icon>
      <ion-label></ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab3" href="/tabs/tab3">
      <ion-icon aria-hidden="true" name="person"></ion-icon>
      <ion-label></ion-label>
    </ion-tab-button>
  </ion-tab-bar>

</ion-tabs>
